{{- if eq .Values.MICROSERVICE.INFRASTRUCTURE "gcp" }}
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: envoy-backendconfig
  namespace: {{ .Release.Namespace | replace "_" "-" }}
spec:
  healthCheck:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 2
    requestPath: "/healthz"
{{- end }}