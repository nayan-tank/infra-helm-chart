apiVersion: v1
kind: Secret
metadata:
  name: secret
  namespace: {{ .Release.Namespace | replace "_" "-" }}
stringData:
  MONGODB: {{ .Values.MONGODB | toJson | quote }}
  RABBITMQ: {{ .Values.RABBITMQ | toJson | quote }}
  GCP_STRING: {{ .Values.MICROSERVICE.CONFIG.GCP_STRING | quote}}
  ENCRYPTION_SECRET: {{ .Values.MICROSERVICE.CONFIG.ENCRYPTION_SECRET | quote}}
  SMTP: {{ .Values.MICROSERVICE.CONFIG.SMTP | toJson | quote }}
type: Opaque
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-mongo-ssl
  namespace: {{ .Release.Namespace | replace "_" "-" }}
type: Opaque
data:
  ca.pem: {{ .Values.MONGODB.ssl_ca_pem }}
  node.pem: {{ .Values.MONGODB.ssl_member_pem }}
  client.pem: {{ .Values.MONGODB.ssl_client_pem }}