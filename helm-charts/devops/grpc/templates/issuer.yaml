{{- if .Values.CERT_MANAGER.install }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  namespace: cert-manager
spec:
  acme:
    email: nayan@upswing.global
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-secret-challenge  # Updated secret name
    solvers:
    - http01:
        ingress:
          ingressClassName: nginx-external
{{- end }}