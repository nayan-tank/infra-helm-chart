# envoy ingress
{{- if .Values.ENVOY.install }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grpc-ingress
  namespace: {{ .Release.Namespace | replace "_" "-" }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  tls:
    - hosts:
      - {{ .Values.ENVOY.url }}
      secretName: backend-cert-envoy
  ingressClassName: nginx-external
  rules:
    - host: {{ .Values.ENVOY.url }}
      http:
        paths:
          - path: "/grpc(/|$)(.*)"
            pathType: Prefix
            backend:
              service:
                name: envoy
                port:
                  number: 8080
          - path: "/admin(/|$)(.*)"
            pathType: Prefix
            backend:
              service:
                name: envoy-admin
                port:
                  number: 9901
{{- end }}
