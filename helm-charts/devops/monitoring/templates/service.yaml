apiVersion: v1
kind: Service
metadata:
  labels:
    app: grafana
  name: grafana-service
  namespace: {{ .Values.NAMESPACE | replace "_" "-" }}
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: prometheus
  name: prometheus-service
  namespace: {{ .Values.NAMESPACE | replace "_" "-" }}
spec:
  selector:
    app: prometheus
  ports:
    - name: http-prometheus
      port: 80
      targetPort: 9090
      protocol: TCP
  type: ClusterIP
