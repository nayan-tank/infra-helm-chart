{{- if eq .Values.INFRASTRUCTURE "aws" }}
kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: mongodb-ssd-storage-{{ .Release.Namespace | replace "_" "-"}}
  namespace: {{ .Release.Namespace | replace "_" "-" }}
provisioner: kubernetes.io/aws-ebs
parameters:
  type: gp2
  fsType: ext4
volumeBindingMode: WaitForFirstConsumer
{{- end }}